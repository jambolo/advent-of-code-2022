name: Python CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # Speeds up subsequent runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # This installs your project in editable mode + dependencies from pyproject.toml
        pip install -e .
        pip install ruff pytest

    - name: Check formatting with Ruff
      run: ruff format . --check

    - name: Lint with Ruff
      run: ruff check .

    - name: Run tests with Pytest
      run: pytest
